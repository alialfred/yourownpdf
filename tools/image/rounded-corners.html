  <script>
    // RND-001: Rounded Corners Tool
    let imageFile = null;
    let originalImage = null;
    let currentRadius = 30;

    document.addEventListener('DOMContentLoaded', function() {
      initTheme();
      const u = document.getElementById('uploadArea');
      const f = document.getElementById('fileInput');
      u.addEventListener('click', () => f.click());
      u.addEventListener('dragover', e => { e.preventDefault(); u.style.borderColor = 'var(--color-b)'; });
      u.addEventListener('dragleave', e => { e.preventDefault(); u.style.borderColor = 'var(--color-border)'; });
      u.addEventListener('drop', e => { e.preventDefault(); u.style.borderColor = 'var(--color-border)'; handle(e.dataTransfer.files[0]); });
      f.addEventListener('change', e => handle(e.target.files[0]));
      document.getElementById('radiusSlider').addEventListener('input', e => {
        currentRadius = parseInt(e.target.value);
        document.getElementById('radiusValue').textContent = currentRadius + 'px';
        document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
        applyRoundedCorners();
      });
      document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target.id === 'modalOverlay') close(); });
    });

    function initTheme() {
      const theme = localStorage.getItem('yourownpdf-theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
      document.querySelector('.theme-toggle').textContent = theme === 'dark' ? '☀️' : '🌙';
      document.addEventListener('click', e => { if (e.target.classList.contains('theme-toggle')) { const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'; document.documentElement.setAttribute('data-theme', t); localStorage.setItem('yourownpdf-theme', t); e.target.textContent = t === 'dark' ? '☀️' : '🌙'; } });
    }

    function setRadius(val) {
      currentRadius = val;
      document.getElementById('radiusSlider').value = val;
      document.getElementById('radiusValue').textContent = val + 'px';
      document.querySelectorAll('.preset-btn').forEach(b => {
        b.classList.toggle('active', parseInt(b.getAttribute('onclick').match(/\d+/)[0]) === val);
      });
      applyRoundedCorners();
    }

    async function handle(file) {
      if (!file || !file.type.startsWith('image/')) { show('Please select an image file', false, true); return; }
      imageFile = file;
      document.getElementById('uploadArea').dataset.fileLoaded = '1';
      originalImage = new Image();
      originalImage.onload = () => {
        document.getElementById('previewCanvas').style.display = 'block';
        document.getElementById('previewPlaceholder').style.display = 'none';
        applyRoundedCorners();
        document.getElementById('applyBtn').disabled = false;
        show('Image loaded! Adjust corners.');
      };
      originalImage.src = URL.createObjectURL(imageFile);
    }

    function applyRoundedCorners() {
      if (!originalImage) return;
      const canvas = document.getElementById('previewCanvas');
      canvas.width = originalImage.width;
      canvas.height = originalImage.height;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const r = Math.min(currentRadius, canvas.width / 2, canvas.height / 2);
      ctx.beginPath();
      ctx.moveTo(r, 0);
      ctx.lineTo(canvas.width - r, 0);
      ctx.quadraticCurveTo(canvas.width, 0, canvas.width, r);
      ctx.lineTo(canvas.width, canvas.height - r);
      ctx.quadraticCurveTo(canvas.width, canvas.height, canvas.width - r, canvas.height);
      ctx.lineTo(r, canvas.height);
      ctx.quadraticCurveTo(0, canvas.height, 0, canvas.height - r);
      ctx.lineTo(0, r);
      ctx.quadraticCurveTo(0, 0, r, 0);
      ctx.closePath();
      ctx.clip();
      ctx.drawImage(originalImage, 0, 0);
      document.getElementById('downloadBtn').classList.add('visible');
    }

    function downloadImage() {
      const canvas = document.getElementById('previewCanvas');
      const a = document.createElement('a');
      a.href = canvas.toDataURL('image/png');
      a.download = 'yourownpdf-rounded.png';
      a.click();
    }

    function show(msg, loading = false, error = false) {
      document.getElementById('modalContent').innerHTML = loading ?
        '<div style="text-align:center"><div class="spinner" style="margin:0 auto 1rem"></div><p>' + msg + '</p></div>' :
        '<div style="text-align:center"><div style="font-size:3rem;margin-bottom:1rem">' + (error ? '❌' : '✅') + '</div><p>' + msg + '</p><button onclick="close()" style="margin-top:1rem;padding:0.5rem 1.5rem;background:var(--color-b);color:white;border:none;border-radius:0.5rem">OK</button></div>';
      document.getElementById('modalOverlay').classList.add('active');
      if (!loading) setTimeout(close, 3000);
    }

    function close() { document.getElementById('modalOverlay').classList.remove('active'); }
  </script>
